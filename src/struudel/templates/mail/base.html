<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Struudel{% endblock %}</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1f2937; line-height: 1.5; margin: 0; padding: 24px; background: #f9fafb;">
<div style="max-width: 560px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px;">
{% block body %}{% endblock %}
<hr style="margin-top: 32px; border: none; border-top: 1px solid #e5e7eb;">
<p style="color: #6b7280; font-size: 12px; margin-top: 16px;">
Struudel &middot; <a href="{{ app_base_url }}" style="color: #6b7280;">{{ app_base_url }}</a>
</p>
</div>
</body>
</html>
