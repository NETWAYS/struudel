{% extends "base.html" %}

{% block page_title %}My polls{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold flex items-center gap-2">
        <i class="ti ti-list-check text-primary"></i>Polls
    </h1>
    <a href="{{ url_for('polls.new') }}" class="btn btn-primary btn-sm">
        <i class="ti ti-plus"></i>New poll
    </a>
</div>

{% include "polls/_tabs.html" %}

{% with polls=polls, show_owner=True, empty_hint='Create one with the New poll button above.' %}
    {% include "polls/_list.html" %}
{% endwith %}
{% endblock %}
